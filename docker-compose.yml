version: "3.9"

services:

  # ─────────────────────────────────────────
  # KEYCLOAK — punya DB sendiri (db-keycloak)
  # ─────────────────────────────────────────
  db-keycloak:
    image: postgres:15
    container_name: db_keycloak
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_pass
    volumes:
      - db_keycloak_data:/var/lib/postgresql/data
    networks:
      - smk3_network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    container_name: sekolah_keycloak
    command: start-dev
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: Admin@SMK3
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db-keycloak:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_pass
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    depends_on:
      - db-keycloak
    networks:
      - smk3_network

  # ─────────────────────────────────────────
  # DATABASE — 1 DB per service (microservices)
  # ─────────────────────────────────────────
  db-pelanggaran:
    image: postgres:15
    container_name: db_pelanggaran
    restart: unless-stopped
    environment:
      POSTGRES_DB: db_pelanggaran
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_pass
    ports:
      - "5433:5432"
    volumes:
      - db_pelanggaran_data:/var/lib/postgresql/data
    networks:
      - smk3_network

  db-profile:
    image: postgres:15
    container_name: db_profile
    restart: unless-stopped
    environment:
      POSTGRES_DB: db_profile
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_pass
    ports:
      - "5434:5432"
    volumes:
      - db_profile_data:/var/lib/postgresql/data
    networks:
      - smk3_network

  db-berita:
    image: postgres:15
    container_name: db_berita
    restart: unless-stopped
    environment:
      POSTGRES_DB: db_berita
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_pass
    ports:
      - "5435:5432"
    volumes:
      - db_berita_data:/var/lib/postgresql/data
    networks:
      - smk3_network

  db-portofolio:
    image: postgres:15
    container_name: db_portofolio
    restart: unless-stopped
    environment:
      POSTGRES_DB: db_portofolio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_pass
    ports:
      - "5436:5432"
    volumes:
      - db_portofolio_data:/var/lib/postgresql/data
    networks:
      - smk3_network

  db-management:
    image: postgres:15
    container_name: db_management
    restart: unless-stopped
    environment:
      POSTGRES_DB: db_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_pass
    ports:
      - "5437:5432"
    volumes:
      - db_management_data:/var/lib/postgresql/data
    networks:
      - smk3_network

  # ─────────────────────────────────────────
  # RABBITMQ — message broker antar service
  # ─────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: sekolah_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: rmq_user
      RABBITMQ_DEFAULT_PASS: rmq_pass
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - smk3_network

# ─────────────────────────────────────────
# VOLUMES — persistent data
# ─────────────────────────────────────────
volumes:
  db_keycloak_data:
  db_pelanggaran_data:
  db_profile_data:
  db_berita_data:
  db_portofolio_data:
  db_management_data:

# ─────────────────────────────────────────
# NETWORK — semua container bisa saling komunikasi
# ─────────────────────────────────────────
networks:
  smk3_network:
    driver: bridge